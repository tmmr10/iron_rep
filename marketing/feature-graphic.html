<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #050505;
  }

  .canvas {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #050505 0%, #0a0a12 40%, #0f0f18 100%);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  /* Subtle lime glow behind icon */
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, #CCFF0015 0%, transparent 70%);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* Secondary glow top-right */
  .glow2 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, #CCFF000a 0%, transparent 70%);
    right: -50px;
    top: -80px;
    pointer-events: none;
  }

  .icon {
    width: 140px;
    height: 140px;
    border-radius: 32px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 8px 40px rgba(204, 255, 0, 0.15), 0 2px 8px rgba(0,0,0,0.5);
    position: relative;
    z-index: 2;
  }

  .icon img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .text {
    position: relative;
    z-index: 2;
  }

  .app-name {
    font-size: 64px;
    font-weight: 700;
    color: #F0F0F5;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 12px;
  }

  .app-name span {
    color: #CCFF00;
  }

  .tagline {
    font-size: 22px;
    font-weight: 400;
    color: #8E8E96;
    letter-spacing: 0.02em;
  }

  /* Subtle grid pattern overlay */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Bottom accent line */
  .accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 10%, #CCFF00 50%, transparent 90%);
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="grid-overlay"></div>

  <div class="icon">
    <img src="screenshots-project/public/app-icon.png" alt="IronRep">
  </div>

  <div class="text">
    <div class="app-name">Iron<span>Rep</span></div>
    <div class="tagline">Your gym. Your rules.</div>
  </div>

  <div class="accent-line"></div>
</div>
</body>
</html>
